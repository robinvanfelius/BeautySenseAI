<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeautySense.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #FAF6F0;
      --cream2:       #F3EBE0;
      --ivory:        #FEFCF9;
      --blush:        #C9907F;
      --blush-dark:   #A3675A;
      --blush-mid:    #C08070;
      --blush-light:  #EDD5CE;
      --blush-xlight: #F5E8E3;
      --gold:         #C4A87C;
      --gold-light:   #E8D8BC;
      --taupe:        #907A6A;
      --taupe-dark:   #5E4B3E;
      --taupe-light:  #C0AA98;
      --taupe-xlight: #DDD0C4;
      --text:         #2A2220;
      --text-muted:   #8A7060;
      --border:       #E0D4C8;
      --border-light: #EDE4DA;
      --radius:       18px;
      --shadow-sm:    0 1px 4px rgba(80,50,35,.08);
      --shadow-md:    0 4px 20px rgba(80,50,35,.12);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,144,127,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(196,168,124,.1) 0%, transparent 50%);
      background-attachment: fixed;
    }

    .app {
      display: flex; flex-direction: column;
      height: 100vh; max-width: 800px; margin: 0 auto;
      position: relative;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px 14px;
      background: rgba(254,252,249,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
      box-shadow: 0 1px 0 rgba(255,255,255,.8), var(--shadow-sm);
      flex-shrink: 0; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 13px; }

    /* Monogram logo */
    .brand-mark {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(145deg, #C9907F 0%, #A3675A 55%, #8A5548 100%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(163,103,90,.35), 0 1px 0 rgba(255,255,255,.2) inset;
    }

    .brand-mark svg {
      width: 24px; height: 24px;
      fill: none; stroke: rgba(255,255,255,.95);
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .brand-text { display: flex; flex-direction: column; gap: 1px; }

    .brand-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.22rem; font-weight: 600;
      color: var(--taupe-dark); letter-spacing: .01em; line-height: 1;
    }

    .brand-name span {
      color: var(--blush-dark);
      font-style: italic; font-weight: 400;
    }

    .brand-tagline {
      font-size: .73rem; font-weight: 300;
      color: var(--taupe-light); letter-spacing: .02em;
    }

    .header-right { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }

    .status-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(168,200,158,.15);
      border: 1px solid rgba(168,200,158,.3);
      border-radius: 20px; padding: 4px 10px;
      font-size: .7rem; font-weight: 500; color: #6A9B60;
      letter-spacing: .03em;
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #88C07A;
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: .5; }
    }

    /* Language switch */
    .lang-switch {
      display: flex;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: 22px; overflow: hidden;
    }

    .lang-btn {
      border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem; font-weight: 600;
      letter-spacing: .05em; padding: 5px 12px;
      color: var(--taupe-light); cursor: pointer; transition: all .2s;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff; border-radius: 20px;
      box-shadow: 0 1px 4px rgba(163,103,90,.3);
    }

    .lang-btn:not(.active):hover { color: var(--taupe-dark); }

    .api-toggle {
      background: rgba(255,255,255,.7);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .73rem; font-weight: 500;
      padding: 6px 14px; border-radius: 20px;
      cursor: pointer; transition: all .2s;
    }

    .api-toggle:hover {
      background: var(--blush-dark); border-color: var(--blush-dark); color: #fff;
    }

    /* ── API Key bar ─────────────────────────────────────── */
    .api-bar {
      background: linear-gradient(135deg, var(--blush-xlight), var(--cream2));
      border-bottom: 1px solid var(--blush-light);
      padding: 12px 28px; display: none; align-items: center; gap: 10px;
      flex-shrink: 0;
    }

    .api-bar.open { display: flex; }

    .api-bar label {
      font-size: .78rem; font-weight: 500;
      color: var(--blush-dark); white-space: nowrap;
    }

    .api-bar input {
      flex: 1; border: 1px solid var(--blush-light); border-radius: 10px;
      padding: 8px 14px; font-size: .83rem;
      font-family: 'Courier New', monospace;
      background: rgba(255,255,255,.85); color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .api-bar input:focus {
      border-color: var(--blush); box-shadow: 0 0 0 3px rgba(201,144,127,.15);
    }

    .api-bar .save-btn {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff; border: none; border-radius: 10px;
      padding: 8px 20px; font-size: .82rem; font-weight: 500;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 8px rgba(163,103,90,.3);
      transition: opacity .2s, transform .1s;
    }

    .api-bar .save-btn:hover  { opacity: .9; }
    .api-bar .save-btn:active { transform: scale(.96); }

    /* ── Messages ────────────────────────────────────────── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 28px 28px 14px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--blush-light); border-radius: 10px;
    }

    .row {
      display: flex; gap: 12px; align-items: flex-end;
      animation: msgIn .3s cubic-bezier(.25,.8,.25,1) both;
    }

    .row.user { flex-direction: row-reverse; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: .64rem; font-weight: 700; letter-spacing: .06em;
    }

    .avatar.ai {
      background: linear-gradient(145deg, var(--blush-mid), var(--blush-dark));
      color: rgba(255,255,255,.95);
      box-shadow: 0 2px 8px rgba(163,103,90,.3);
    }

    .avatar.user {
      background: linear-gradient(145deg, var(--taupe), var(--taupe-dark));
      color: rgba(255,255,255,.95);
      box-shadow: 0 2px 8px rgba(60,40,30,.2);
    }

    .bubble {
      max-width: 76%; padding: 14px 18px;
      border-radius: var(--radius); font-size: .92rem; line-height: 1.72;
      font-weight: 300; position: relative;
    }

    .bubble.ai {
      background: var(--ivory);
      border: 1px solid var(--border-light);
      border-bottom-left-radius: 5px;
      color: var(--text);
      box-shadow: var(--shadow-sm), 0 0 0 1px rgba(255,255,255,.6) inset;
    }

    /* Blush accent line */
    .bubble.ai::before {
      content: ''; position: absolute;
      left: 0; top: 18px; bottom: 18px; width: 3px;
      background: linear-gradient(to bottom, var(--blush-light), rgba(237,213,206,.1));
      border-radius: 3px;
    }

    .bubble.user {
      background: linear-gradient(145deg, var(--blush-xlight), #EDD8CE);
      border: 1px solid rgba(201,144,127,.2);
      border-bottom-right-radius: 5px;
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .bubble ul, .bubble ol { padding-left: 1.4em; margin: 8px 0; }
    .bubble li   { margin: 5px 0; }
    .bubble strong { font-weight: 600; color: var(--blush-dark); }
    .bubble p { margin: 7px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }

    /* typing indicator */
    .typing-dots {
      display: flex; align-items: center; gap: 5px; padding: 16px 20px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--blush-light); border-radius: 50%;
      animation: bounce 1.3s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0);   opacity: .45; }
      40%          { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Quick replies ───────────────────────────────────── */
    .quick-replies {
      padding: 2px 28px 16px;
      display: none; flex-wrap: wrap; gap: 9px; flex-shrink: 0;
    }

    .quick-replies.visible { display: flex; }

    .choice-btn {
      background: var(--ivory);
      border: 1.5px solid var(--border);
      color: var(--taupe-dark);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 400;
      padding: 9px 20px; border-radius: 24px;
      cursor: pointer; transition: all .2s; line-height: 1.3;
      box-shadow: var(--shadow-sm);
    }

    .choice-btn:hover {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      border-color: transparent; color: #fff;
      box-shadow: 0 4px 14px rgba(163,103,90,.3); transform: translateY(-2px);
    }

    .choice-btn:active { transform: translateY(0) scale(.97); }

    .choice-btn.anders {
      background: transparent; border-style: dashed;
      border-color: var(--taupe-xlight); color: var(--text-muted); box-shadow: none;
    }

    .choice-btn.anders:hover {
      background: var(--cream2); border-color: var(--taupe-light);
      color: var(--taupe-dark); box-shadow: none; transform: translateY(-1px);
    }

    /* ── Input area ──────────────────────────────────────── */
    .input-area {
      border-top: 1px solid var(--border-light);
      background: rgba(254,252,249,.95);
      backdrop-filter: blur(12px);
      padding: 14px 22px 18px; flex-shrink: 0;
      box-shadow: 0 -4px 20px rgba(80,50,35,.06);
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--ivory);
      border: 1.5px solid var(--border); border-radius: 24px;
      padding: 8px 8px 8px 18px;
      transition: border-color .25s, box-shadow .25s;
      box-shadow: var(--shadow-sm), 0 0 0 1px rgba(255,255,255,.7) inset;
    }

    .input-row:focus-within {
      border-color: var(--blush);
      box-shadow: 0 0 0 4px rgba(201,144,127,.12), var(--shadow-sm);
    }

    textarea {
      flex: 1; border: none; padding: 5px 0;
      font-size: .92rem; font-family: 'DM Sans', sans-serif; font-weight: 300;
      resize: none; line-height: 1.55;
      background: transparent; color: var(--text); outline: none;
      max-height: 130px; overflow-y: auto;
    }

    textarea::placeholder { color: var(--taupe-xlight); font-style: italic; }

    .send-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: linear-gradient(145deg, var(--blush-mid), var(--blush-dark));
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .22s;
      box-shadow: 0 2px 8px rgba(163,103,90,.35);
    }

    .send-btn:hover  { transform: scale(1.08); box-shadow: 0 4px 14px rgba(163,103,90,.4); }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled {
      background: linear-gradient(145deg, var(--taupe-xlight), #C8B8A8);
      box-shadow: none; cursor: default; transform: none;
    }

    .send-btn svg { width: 16px; height: 16px; margin-left: 2px; }

    .input-hint {
      font-size: .7rem; font-weight: 300; color: var(--taupe-xlight);
      margin-top: 9px; text-align: center; letter-spacing: .01em;
    }

    .input-area.choice-mode .input-row  { display: none; }
    .input-area.choice-mode .input-hint { display: none; }

    /* ── Date divider ────────────────────────────────────── */
    .day-label {
      text-align: center; font-size: .7rem; font-weight: 500;
      color: var(--taupe-xlight); letter-spacing: .1em;
      text-transform: uppercase; position: relative; flex-shrink: 0;
    }

    .day-label::before, .day-label::after {
      content: ''; position: absolute; top: 50%;
      width: 32%; height: 1px; background: var(--border-light);
    }

    .day-label::before { left: 0; }
    .day-label::after  { right: 0; }

    /* ── Welcome screen (no API key) ─────────────────────── */
    .welcome-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 48px 32px;
      gap: 16px; flex: 1;
      animation: msgIn .5s ease both;
    }

    .welcome-icon {
      width: 72px; height: 72px; border-radius: 22px;
      background: linear-gradient(145deg, var(--blush-xlight), var(--gold-light));
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
      box-shadow: 0 4px 20px rgba(201,144,127,.2);
    }

    .welcome-icon svg {
      width: 34px; height: 34px;
      fill: none; stroke: var(--blush-dark);
      stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round;
    }

    .welcome-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 600;
      color: var(--taupe-dark); line-height: 1.3;
    }

    .welcome-sub {
      font-size: .88rem; font-weight: 300; color: var(--text-muted);
      max-width: 340px; line-height: 1.65;
    }

    .welcome-btn {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff; border: none; border-radius: 24px;
      padding: 12px 28px; font-size: .88rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      box-shadow: 0 4px 16px rgba(163,103,90,.35);
      transition: all .2s; margin-top: 4px;
    }

    .welcome-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(163,103,90,.4); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 520px) {
      header { padding: 12px 16px 11px; }
      .brand-name { font-size: 1.08rem; }
      .messages { padding: 18px 14px 10px; }
      .quick-replies { padding: 2px 14px 12px; }
      .input-area { padding: 10px 14px 14px; }
      .api-bar { padding: 10px 14px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24">
          <path d="M12 3C8 3 5 6.5 5 10.5c0 2.8 1.5 5.2 3.8 6.5"/>
          <path d="M12 3c4 0 7 3.5 7 7.5c0 2.8-1.5 5.2-3.8 6.5"/>
          <path d="M9 17c0 2 1.3 3.5 3 3.5s3-1.5 3-3.5"/>
          <line x1="12" y1="20.5" x2="12" y2="12"/>
          <circle cx="12" cy="10" r="1.5" fill="rgba(255,255,255,.9)" stroke="none"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Beauty<span>Sense</span>.AI</span>
        <span class="brand-tagline" id="tagline">Jouw persoonlijke beauty specialist</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="status-dot"></div>
        <span id="statusLabel">online</span>
      </div>
      <div class="lang-switch">
        <button class="lang-btn active" id="btnNL" onclick="setLang('nl')">NL</button>
        <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
      </div>
      <button class="api-toggle" id="apiToggle">API-sleutel</button>
    </div>
  </header>

  <!-- API key bar -->
  <div class="api-bar" id="apiBar">
    <label for="apiKeyInput" id="apiLabel">Anthropic API-sleutel</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
    <button class="save-btn" id="saveKey">Opslaan</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- Input -->
  <div class="input-area" id="inputArea">
    <div class="input-row">
      <textarea id="userInput" rows="1"
        placeholder="Schrijf hier je bericht..."
        aria-label="Berichtenveld"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Versturen" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint" id="inputHint">
      Enter om te versturen &nbsp;·&nbsp; Shift+Enter voor nieuwe regel
    </div>
  </div>

</div>

<script>
  const MODEL   = 'claude-sonnet-4-20250514';
  const history = [];
  let   apiKey  = localStorage.getItem('bs_api_key') || '';
  let   lang    = localStorage.getItem('bs_lang') || 'nl';
  let   busy    = false;

  // ── i18n ─────────────────────────────────────────────────
  const T = {
    nl: {
      tagline:     'Jouw persoonlijke beauty specialist',
      apiLabel:    'Anthropic API-sleutel',
      apiToggle:   'API-sleutel',
      save:        'Opslaan',
      today:       'Vandaag',
      placeholder: 'Schrijf hier je bericht...',
      noKey:       'Voer eerst je API-sleutel in via "API-sleutel" rechtsboven',
      hint:        'Enter om te versturen \u00a0·\u00a0 Shift+Enter voor nieuwe regel',
      anders:      'Anders, namelijk\u2026',
      errPrefix:   'Er ging iets mis',
      errSuffix:   'Controleer je API-sleutel en probeer het opnieuw.',
      youLabel:    'JIJ',
      status:      'online',
      welcomeTitle:'Welkom bij BeautySense',
      welcomeSub:  'Vul je Anthropic API-sleutel in om te beginnen. Je sleutel wordt alleen lokaal opgeslagen.',
      welcomeBtn:  'API-sleutel invoeren',
    },
    en: {
      tagline:     'Your personal beauty specialist',
      apiLabel:    'Anthropic API key',
      apiToggle:   'API key',
      save:        'Save',
      today:       'Today',
      placeholder: 'Write your message here\u2026',
      noKey:       'Please enter your API key via "API key" in the top right',
      hint:        'Enter to send \u00a0·\u00a0 Shift+Enter for new line',
      anders:      'Other, namely\u2026',
      errPrefix:   'Something went wrong',
      errSuffix:   'Check your API key and try again.',
      youLabel:    'YOU',
      status:      'online',
      welcomeTitle:'Welcome to BeautySense',
      welcomeSub:  'Enter your Anthropic API key to get started. Your key is only stored locally.',
      welcomeBtn:  'Enter API key',
    }
  };

  // ── System prompts ────────────────────────────────────────
  const SYSTEM = {
    nl: `Je bent BeautySense.AI, een rustige en deskundige beauty specialist.
Je voelt als een betrouwbare vriend of vriendin die alles weet over beauty — zonder te oordelen, zonder ingewikkeld te doen, en voor iedereen toegankelijk. Of je nu man, vrouw of non-binair bent.

Specialisaties: Haarverzorging (alle haartypes), Skincare (alle huidtypes), Makeup, Lichaamsverzorging, Zonbescherming, Anti-aging, Voeding en beauty van binnenuit, Parfum advies.

Intake gesprek — stel vragen één voor één, nooit allemaal tegelijk. Wacht altijd op het antwoord.

Stap 1: Begroeting — welk onderwerp.
Stap 2: Ervaring — Beginner / Gemiddeld / Gevorderd.
Stap 3: Seizoen — Lente / Zomer / Herfst / Winter.
Stap 4: Budget — Betaalbaar (drugstore) / Midden / Premium.
Stap 5: Voorkeuren — vegan, allergieën, te vermijden ingrediënten.
Stap 6: Concreet advies met producten, stap-voor-stap routine.

Ingrediënten scanner: analyseer ingrediëntenlijst → Aanrader / Twijfel / Niet geschikt.

Toon: Warm, rustig, menselijk, persoonlijk. Geen emoji's. Geen typisch vrouwelijke taal.

Nooit: medische diagnoses, één merk pushen, vage antwoorden, aannames over geslacht.

OPMAAK: Bij een keuzevraag (intake stappen 1–5) eindig je met de opties als losse regels beginnend met "- ". Alleen voor echte keuze-opties.`,

    en: `You are BeautySense.AI, a calm and knowledgeable beauty specialist.
You feel like a trusted friend who knows everything about beauty — without judgement, without complexity, accessible to everyone, regardless of gender.

Specialisations: Hair care, Skincare, Makeup, Body care, Sun protection, Anti-aging, Nutrition & inner beauty, Perfume advice.

Intake — one question at a time, always wait for the answer.

Step 1: Greeting — which topic.
Step 2: Experience — Beginner / Intermediate / Advanced.
Step 3: Season — Spring / Summer / Autumn / Winter.
Step 4: Budget — Affordable (drugstore) / Mid-range / Premium.
Step 5: Preferences — vegan, allergies, ingredients to avoid.
Step 6: Concrete advice with products and step-by-step routine.

Ingredient scanner: analyse ingredient list → Recommended / Uncertain / Not suitable.

Tone: Warm, calm, human, personal. No emojis. No gendered language.

Never: medical diagnoses, push one brand, vague answers, gender assumptions.

FORMAT: When asking a choice question (intake steps 1–5), end with options as separate lines starting with "- ". Only for actual choice options.`
  };

  // ── Greetings ─────────────────────────────────────────────
  const GREETING = {
    nl: `Hoi, ik ben BeautySense. Jouw persoonlijke specialist op het gebied van skincare, haarverzorging en makeup — volledig op maat gemaakt voor jou.

Waar kan ik je vandaag mee helpen?

- Skincare
- Haarverzorging
- Makeup
- Lichaamsverzorging
- Zonbescherming
- Anti-aging
- Voeding en beauty van binnenuit
- Parfum advies`,

    en: `Hi, I'm BeautySense. Your personal specialist in skincare, hair care and makeup — fully tailored to you.

What can I help you with today?

- Skincare
- Hair care
- Makeup
- Body care
- Sun protection
- Anti-aging
- Nutrition & inner beauty
- Perfume advice`
  };

  // ── DOM ───────────────────────────────────────────────────
  const messagesEl   = document.getElementById('messages');
  const quickReplies = document.getElementById('quickReplies');
  const inputArea    = document.getElementById('inputArea');
  const userInput    = document.getElementById('userInput');
  const sendBtn      = document.getElementById('sendBtn');
  const apiBar       = document.getElementById('apiBar');
  const apiToggle    = document.getElementById('apiToggle');
  const apiKeyInput  = document.getElementById('apiKeyInput');
  const saveKeyBtn   = document.getElementById('saveKey');
  const taglineEl    = document.getElementById('tagline');
  const apiLabelEl   = document.getElementById('apiLabel');
  const inputHintEl  = document.getElementById('inputHint');
  const statusLabel  = document.getElementById('statusLabel');
  const btnNL        = document.getElementById('btnNL');
  const btnEN        = document.getElementById('btnEN');

  // ── Language ──────────────────────────────────────────────
  function applyLang() {
    const t = T[lang];
    taglineEl.textContent    = t.tagline;
    apiLabelEl.textContent   = t.apiLabel;
    apiToggle.textContent    = t.apiToggle;
    saveKeyBtn.textContent   = t.save;
    inputHintEl.innerHTML    = t.hint;
    statusLabel.textContent  = t.status;
    document.documentElement.lang = lang;
    btnNL.classList.toggle('active', lang === 'nl');
    btnEN.classList.toggle('active', lang === 'en');
    updateSendState();
  }

  function setLang(l) {
    if (l === lang) return;
    lang = l;
    localStorage.setItem('bs_lang', lang);
    applyLang();
    history.length = 0;
    clearChoices();
    messagesEl.innerHTML = '';
    if (apiKey) showGreeting(); else showWelcome();
  }

  applyLang();

  // ── API key ───────────────────────────────────────────────
  if (apiKey) apiKeyInput.value = apiKey;
  updateSendState();

  apiToggle.addEventListener('click', () => apiBar.classList.toggle('open'));

  saveKeyBtn.addEventListener('click', () => {
    const val = apiKeyInput.value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('bs_api_key', apiKey);
    apiBar.classList.remove('open');
    updateSendState();
    if (history.length === 0) {
      messagesEl.innerHTML = '';
      showGreeting();
    }
  });

  // ── Welcome screen ────────────────────────────────────────
  function showWelcome() {
    const t = T[lang];
    const el = document.createElement('div');
    el.className = 'welcome-screen';
    el.innerHTML = `
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 3C8 3 5 6.5 5 10.5c0 2.8 1.5 5.2 3.8 6.5"/>
          <path d="M12 3c4 0 7 3.5 7 7.5c0 2.8-1.5 5.2-3.8 6.5"/>
          <path d="M9 17c0 2 1.3 3.5 3 3.5s3-1.5 3-3.5"/>
          <line x1="12" y1="20.5" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="welcome-title">${t.welcomeTitle}</div>
      <div class="welcome-sub">${t.welcomeSub}</div>
      <button class="welcome-btn">${t.welcomeBtn}</button>`;
    el.querySelector('.welcome-btn').addEventListener('click', () => {
      apiBar.classList.add('open');
      apiKeyInput.focus();
    });
    messagesEl.appendChild(el);
  }

  // ── Helpers ───────────────────────────────────────────────
  function updateSendState() {
    const t = T[lang];
    sendBtn.disabled   = !apiKey || busy;
    userInput.disabled = !apiKey || busy;
    userInput.placeholder = apiKey ? t.placeholder : t.noKey;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Markdown ──────────────────────────────────────────────
  function renderMarkdown(text) {
    let s = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/^- (.+)$/gm, '<li>$1</li>');
    s = s.replace(/(<li>[\s\S]*?<\/li>)(\n<li>[\s\S]*?<\/li>)*/g, m => `<ul>${m}</ul>`);
    return s.split(/\n{2,}/).map(b => b.trim()).filter(Boolean)
      .map(b => b.startsWith('<ul>') || b.startsWith('<ol>')
        ? b : `<p>${b.replace(/\n/g, '<br>')}</p>`)
      .join('');
  }

  // ── Extract options ───────────────────────────────────────
  function extractOptions(text) {
    const opts = text.split('\n')
      .map(l => l.match(/^-\s+(.+)$/)).filter(Boolean).map(m => m[1].trim());
    return (opts.length >= 2 && opts.length <= 10) ? opts : [];
  }

  // ── Choice buttons ────────────────────────────────────────
  function showChoices(options) {
    quickReplies.innerHTML = '';
    inputArea.classList.add('choice-mode');
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn'; btn.textContent = opt;
      btn.addEventListener('click', () => { clearChoices(); sendText(opt); });
      quickReplies.appendChild(btn);
    });
    const anders = document.createElement('button');
    anders.className = 'choice-btn anders';
    anders.textContent = T[lang].anders;
    anders.addEventListener('click', () => { clearChoices(); userInput.focus(); });
    quickReplies.appendChild(anders);
    quickReplies.classList.add('visible');
    scrollBottom();
  }

  function clearChoices() {
    quickReplies.classList.remove('visible');
    quickReplies.innerHTML = '';
    inputArea.classList.remove('choice-mode');
  }

  // ── Messages ──────────────────────────────────────────────
  function appendMessage(role, text) {
    const row = document.createElement('div');
    row.className = `row ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'BS' : T[lang].youLabel;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = renderMarkdown(text);
    row.appendChild(avatar); row.appendChild(bubble);
    messagesEl.appendChild(row); scrollBottom();
  }

  function showTyping() {
    const row = document.createElement('div');
    row.id = 'typing-row'; row.className = 'row ai';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai'; avatar.textContent = 'BS';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai typing-dots';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(avatar); row.appendChild(bubble);
    messagesEl.appendChild(row); scrollBottom();
  }

  function removeTyping() { document.getElementById('typing-row')?.remove(); }

  // ── Greeting ──────────────────────────────────────────────
  function showGreeting() {
    const g = GREETING[lang];
    appendMessage('ai', g);
    history.push({ role: 'assistant', content: g });
    const opts = extractOptions(g);
    if (opts.length) showChoices(opts);
  }

  // ── Init ─────────────────────────────────────────────────
  if (apiKey) showGreeting(); else showWelcome();

  // ── Input ─────────────────────────────────────────────────
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 130) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!busy && apiKey) sendFromInput();
    }
  });

  sendBtn.addEventListener('click', () => { if (!busy && apiKey) sendFromInput(); });

  function sendFromInput() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = ''; userInput.style.height = 'auto';
    clearChoices(); sendText(text);
  }

  // ── API ───────────────────────────────────────────────────
  async function sendText(text) {
    busy = true; updateSendState();
    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type':      'application/json',
          'x-api-key':         apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: MODEL, max_tokens: 1024,
          system: SYSTEM[lang], messages: history
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data  = await res.json();
      const reply = data.content?.[0]?.text || '...';

      removeTyping();
      appendMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });

      const opts = extractOptions(reply);
      if (opts.length) showChoices(opts);

    } catch (err) {
      removeTyping();
      const t = T[lang];
      appendMessage('ai', `${t.errPrefix}: ${err.message}\n\n${t.errSuffix}`);
    }

    busy = false; updateSendState();
    if (!inputArea.classList.contains('choice-mode')) userInput.focus();
  }
</script>
</body>
</html>
