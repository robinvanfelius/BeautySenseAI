<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeautySense.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #FAF6F0;
      --cream2:       #F3EBE0;
      --ivory:        #FEFCF9;
      --blush:        #C9907F;
      --blush-dark:   #A3675A;
      --blush-mid:    #C08070;
      --blush-light:  #EDD5CE;
      --blush-xlight: #F5E8E3;
      --gold:         #C4A87C;
      --gold-light:   #E8D8BC;
      --taupe:        #907A6A;
      --taupe-dark:   #5E4B3E;
      --taupe-light:  #C0AA98;
      --taupe-xlight: #DDD0C4;
      --text:         #2A2220;
      --text-muted:   #8A7060;
      --border:       #E0D4C8;
      --border-light: #EDE4DA;
      --radius:       18px;
      --shadow-sm:    0 1px 4px rgba(80,50,35,.08);
      --shadow-md:    0 4px 20px rgba(80,50,35,.12);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,144,127,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(196,168,124,.1) 0%, transparent 50%);
      background-attachment: fixed;
    }

    .app {
      display: flex; flex-direction: column;
      height: 100vh; max-width: 800px; margin: 0 auto;
      position: relative;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px 14px;
      background: rgba(254,252,249,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
      box-shadow: 0 1px 0 rgba(255,255,255,.8), var(--shadow-sm);
      flex-shrink: 0; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 13px; }

    /* Monogram logo */
    .brand-mark {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(145deg, #C9907F 0%, #A3675A 55%, #8A5548 100%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(163,103,90,.35), 0 1px 0 rgba(255,255,255,.2) inset;
    }

    .brand-mark svg {
      width: 24px; height: 24px;
      fill: none; stroke: rgba(255,255,255,.95);
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .brand-text { display: flex; flex-direction: column; gap: 1px; }

    .brand-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.22rem; font-weight: 600;
      color: var(--taupe-dark); letter-spacing: .01em; line-height: 1;
    }

    .brand-name span {
      color: var(--blush-dark);
      font-style: italic; font-weight: 400;
    }

    .brand-tagline {
      font-size: .73rem; font-weight: 300;
      color: var(--taupe-light); letter-spacing: .02em;
    }

    .header-right { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }

    /* Language switch */
    .lang-switch {
      display: flex;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: 22px; overflow: hidden;
    }

    .lang-btn {
      border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem; font-weight: 600;
      letter-spacing: .05em; padding: 5px 12px;
      color: var(--taupe-light); cursor: pointer; transition: all .2s;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff; border-radius: 20px;
      box-shadow: 0 1px 4px rgba(163,103,90,.3);
    }

    .lang-btn:not(.active):hover { color: var(--taupe-dark); }


    /* ── Messages ────────────────────────────────────────── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 28px 28px 14px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--blush-light); border-radius: 10px;
    }

    .row {
      display: flex; gap: 12px; align-items: flex-end;
      animation: msgIn .3s cubic-bezier(.25,.8,.25,1) both;
    }

    .row.user { flex-direction: row-reverse; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: .64rem; font-weight: 700; letter-spacing: .06em;
    }

    .avatar.ai {
      background: linear-gradient(145deg, var(--blush-mid), var(--blush-dark));
      color: rgba(255,255,255,.95);
      box-shadow: 0 2px 8px rgba(163,103,90,.3);
    }

    .avatar.user {
      background: linear-gradient(145deg, var(--taupe), var(--taupe-dark));
      color: rgba(255,255,255,.95);
      box-shadow: 0 2px 8px rgba(60,40,30,.2);
    }

    .bubble {
      max-width: 76%; padding: 14px 18px;
      border-radius: var(--radius); font-size: .92rem; line-height: 1.72;
      font-weight: 300; position: relative;
    }

    .bubble.ai {
      background: var(--ivory);
      border: 1px solid var(--border-light);
      border-bottom-left-radius: 5px;
      color: var(--text);
      box-shadow: var(--shadow-sm), 0 0 0 1px rgba(255,255,255,.6) inset;
    }

    /* Blush accent line */
    .bubble.ai::before {
      content: ''; position: absolute;
      left: 0; top: 18px; bottom: 18px; width: 3px;
      background: linear-gradient(to bottom, var(--blush-light), rgba(237,213,206,.1));
      border-radius: 3px;
    }

    .bubble.user {
      background: linear-gradient(145deg, var(--blush-xlight), #EDD8CE);
      border: 1px solid rgba(201,144,127,.2);
      border-bottom-right-radius: 5px;
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .bubble ul, .bubble ol { padding-left: 1.4em; margin: 8px 0; }
    .bubble li   { margin: 5px 0; }
    .bubble strong { font-weight: 600; color: var(--blush-dark); }
    .bubble p { margin: 7px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }

    /* typing indicator */
    .typing-dots {
      display: flex; align-items: center; gap: 5px; padding: 16px 20px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--blush-light); border-radius: 50%;
      animation: bounce 1.3s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0);   opacity: .45; }
      40%          { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Quick replies ───────────────────────────────────── */
    .quick-replies {
      padding: 6px 28px 10px;
      display: none;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 7px;
      flex-shrink: 0;
      max-height: 52px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .quick-replies::-webkit-scrollbar { display: none; }

    .quick-replies.visible { display: flex; }

    .choice-btn {
      background: var(--ivory);
      border: 1.5px solid var(--border);
      color: var(--taupe-dark);
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem; font-weight: 400;
      padding: 6px 14px; border-radius: 20px;
      cursor: pointer; transition: all .2s; line-height: 1.2;
      box-shadow: var(--shadow-sm);
      white-space: nowrap; flex-shrink: 0;
    }

    .choice-btn:hover {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      border-color: transparent; color: #fff;
      box-shadow: 0 3px 10px rgba(163,103,90,.3); transform: translateY(-1px);
    }

    .choice-btn:active { transform: translateY(0) scale(.97); }

    .choice-btn.anders {
      background: transparent; border-style: dashed;
      border-color: var(--taupe-xlight); color: var(--text-muted); box-shadow: none;
    }

    .choice-btn.anders:hover {
      background: var(--cream2); border-color: var(--taupe-light);
      color: var(--taupe-dark); box-shadow: none; transform: translateY(-1px);
    }

    /* ── Input area ──────────────────────────────────────── */
    .input-area {
      border-top: 1px solid var(--border-light);
      background: rgba(254,252,249,.95);
      backdrop-filter: blur(12px);
      padding: 14px 22px 18px; flex-shrink: 0;
      box-shadow: 0 -4px 20px rgba(80,50,35,.06);
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--ivory);
      border: 1.5px solid var(--border); border-radius: 24px;
      padding: 8px 8px 8px 18px;
      transition: border-color .25s, box-shadow .25s;
      box-shadow: var(--shadow-sm), 0 0 0 1px rgba(255,255,255,.7) inset;
    }

    .input-row:focus-within {
      border-color: var(--blush);
      box-shadow: 0 0 0 4px rgba(201,144,127,.12), var(--shadow-sm);
    }

    textarea {
      flex: 1; border: none; padding: 5px 0;
      font-size: .92rem; font-family: 'DM Sans', sans-serif; font-weight: 300;
      resize: none; line-height: 1.55;
      background: transparent; color: var(--text); outline: none;
      max-height: 130px; overflow-y: auto;
    }

    textarea::placeholder { color: var(--taupe-xlight); font-style: italic; }

    .send-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: linear-gradient(145deg, var(--blush-mid), var(--blush-dark));
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .22s;
      box-shadow: 0 2px 8px rgba(163,103,90,.35);
    }

    .send-btn:hover  { transform: scale(1.08); box-shadow: 0 4px 14px rgba(163,103,90,.4); }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled {
      background: linear-gradient(145deg, var(--taupe-xlight), #C8B8A8);
      box-shadow: none; cursor: default; transform: none;
    }

    .send-btn svg { width: 16px; height: 16px; margin-left: 2px; }

    .input-hint {
      font-size: .7rem; font-weight: 300; color: var(--taupe-xlight);
      margin-top: 9px; text-align: center; letter-spacing: .01em;
    }

    /* input is always visible — quick replies appear above it */

    /* ── Date divider ────────────────────────────────────── */
    .day-label {
      text-align: center; font-size: .7rem; font-weight: 500;
      color: var(--taupe-xlight); letter-spacing: .1em;
      text-transform: uppercase; position: relative; flex-shrink: 0;
    }

    .day-label::before, .day-label::after {
      content: ''; position: absolute; top: 50%;
      width: 32%; height: 1px; background: var(--border-light);
    }

    .day-label::before { left: 0; }
    .day-label::after  { right: 0; }


    /* ── Auth modal ──────────────────────────────────────── */
    .auth-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(42,34,32,.5); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .auth-overlay.open { display: flex; }

    .auth-card {
      background: var(--ivory); border-radius: 24px;
      padding: 36px 32px; width: 100%; max-width: 380px; margin: 16px;
      box-shadow: 0 20px 60px rgba(80,50,35,.22);
      animation: msgIn .3s ease both;
    }

    .auth-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; font-weight: 600; color: var(--taupe-dark);
      text-align: center; margin-bottom: 4px;
    }
    .auth-logo em { color: var(--blush-dark); font-style: italic; font-weight: 400; }

    .auth-sub {
      font-size: .82rem; color: var(--text-muted);
      text-align: center; margin-bottom: 24px; line-height: 1.5;
    }

    .auth-tabs {
      display: flex; border: 1.5px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 22px;
    }
    .auth-tab {
      flex: 1; padding: 9px; background: transparent; border: none;
      font-family: 'DM Sans', sans-serif; font-size: .83rem; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: all .2s;
    }
    .auth-tab.active {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff;
    }

    .auth-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .auth-field label { font-size: .78rem; font-weight: 500; color: var(--taupe); }
    .auth-field input {
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 10px 14px; font-size: .88rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream); color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .auth-field input:focus {
      border-color: var(--blush); box-shadow: 0 0 0 3px rgba(201,144,127,.15);
    }

    .auth-submit {
      width: 100%; padding: 12px; margin-top: 6px;
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff; border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 4px 14px rgba(163,103,90,.3);
    }
    .auth-submit:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .auth-submit:disabled { opacity: .6; cursor: not-allowed; }

    .auth-error {
      font-size: .78rem; color: #C44444; text-align: center;
      margin-top: 10px; min-height: 18px;
    }

    /* ── Header auth area ────────────────────────────────── */
    .login-btn {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff; border: none; border-radius: 20px;
      font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 500;
      padding: 7px 16px; cursor: pointer; transition: all .2s;
      box-shadow: 0 2px 8px rgba(163,103,90,.25); white-space: nowrap;
    }
    .login-btn:hover { opacity: .9; }

    .user-pill {
      display: none; align-items: center; gap: 7px;
      background: rgba(255,255,255,.7); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
      font-size: .75rem; color: var(--taupe-dark);
    }
    .usage-count { font-weight: 600; color: var(--blush-dark); }
    .usage-count.premium { color: var(--gold); }
    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: .73rem;
      font-family: 'DM Sans', sans-serif; padding: 0;
      transition: color .2s;
    }
    .logout-btn:hover { color: var(--blush-dark); }

    /* ── Limit banner ────────────────────────────────────── */
    .limit-banner {
      display: none; flex-shrink: 0;
      background: linear-gradient(135deg, var(--blush-xlight), var(--gold-light));
      border-bottom: 1px solid var(--blush-light);
      padding: 11px 28px;
      align-items: center; justify-content: space-between; gap: 12px;
    }
    .limit-banner.show { display: flex; }
    .limit-text { font-size: .82rem; color: var(--taupe-dark); line-height: 1.4; }
    .upgrade-btn {
      background: linear-gradient(135deg, var(--gold), #B8935A);
      color: #fff; border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 500;
      padding: 7px 16px; cursor: pointer; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(196,168,124,.4); transition: all .2s;
    }
    .upgrade-btn:hover { opacity: .9; }

    /* ── Login wall (not authenticated) ─────────────────── */
    .login-wall {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 48px 32px; gap: 14px; flex: 1;
    }
    .login-wall-icon {
      width: 68px; height: 68px; border-radius: 20px;
      background: linear-gradient(145deg, var(--blush-xlight), var(--gold-light));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(201,144,127,.2);
    }
    .login-wall-icon svg {
      width: 32px; height: 32px; fill: none; stroke: var(--blush-dark);
      stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round;
    }
    .login-wall-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-weight: 600; color: var(--taupe-dark);
    }
    .login-wall-sub {
      font-size: .88rem; color: var(--text-muted);
      max-width: 300px; line-height: 1.65;
    }
    .login-wall-btn {
      background: linear-gradient(135deg, var(--blush), var(--blush-dark));
      color: #fff; border: none; border-radius: 24px;
      padding: 12px 32px; font-size: .9rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      box-shadow: 0 4px 16px rgba(163,103,90,.35); transition: all .2s;
    }
    .login-wall-btn:hover { transform: translateY(-2px); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 520px) {
      header { padding: 12px 16px 11px; }
      .brand-name { font-size: 1.08rem; }
      .messages { padding: 18px 14px 10px; }
      .quick-replies { padding: 4px 14px 8px; max-height: 48px; }
      .input-area { padding: 10px 14px 14px; }
      .limit-banner { padding: 10px 14px; flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24">
          <path d="M12 3C8 3 5 6.5 5 10.5c0 2.8 1.5 5.2 3.8 6.5"/>
          <path d="M12 3c4 0 7 3.5 7 7.5c0 2.8-1.5 5.2-3.8 6.5"/>
          <path d="M9 17c0 2 1.3 3.5 3 3.5s3-1.5 3-3.5"/>
          <line x1="12" y1="20.5" x2="12" y2="12"/>
          <circle cx="12" cy="10" r="1.5" fill="rgba(255,255,255,.9)" stroke="none"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Beauty<span>Sense</span>.AI</span>
        <span class="brand-tagline" id="tagline">Jouw persoonlijke beauty specialist</span>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-switch">
        <button class="lang-btn active" id="btnNL" onclick="setLang('nl')">NL</button>
        <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
      </div>
      <button class="login-btn" id="loginBtn">Inloggen</button>
      <div class="user-pill" id="userPill">
        <span id="userEmail"></span>
        <span class="usage-count" id="usageCount"></span>
        <button class="logout-btn" id="logoutBtn">Uitloggen</button>
      </div>
    </div>
  </header>

  <!-- Auth modal -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <div class="auth-logo">Beauty<em>Sense</em>.AI</div>
      <div class="auth-sub" id="authSub">Jouw persoonlijke beauty specialist — maak een gratis account aan</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin"    onclick="switchTab('login')">Inloggen</button>
        <button class="auth-tab"        id="tabRegister" onclick="switchTab('register')">Registreren</button>
      </div>
      <div class="auth-field">
        <label for="authEmail">E-mailadres</label>
        <input type="email" id="authEmail" placeholder="jouw@email.nl" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="authPassword">Wachtwoord</label>
        <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="auth-submit" id="authSubmit">Inloggen</button>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>

  <!-- Limiet banner -->
  <div class="limit-banner" id="limitBanner">
    <span class="limit-text" id="limitText">Je hebt je 5 dagelijkse vragen gebruikt. Morgen kun je weer 5 vragen stellen.</span>
    <button class="upgrade-btn" id="upgradeBtn">Upgrade naar Premium</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- Input -->
  <div class="input-area" id="inputArea">
    <div class="input-row">
      <textarea id="userInput" rows="1"
        placeholder="Schrijf hier je bericht..."
        aria-label="Berichtenveld"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Versturen" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint" id="inputHint">
      Enter om te versturen &nbsp;·&nbsp; Shift+Enter voor nieuwe regel
    </div>
  </div>

</div>

<script>
  const MODEL      = 'claude-sonnet-4-20250514';
  const FREE_LIMIT = 5;
  const history    = [];
  let   lang       = localStorage.getItem('bs_lang') || 'nl';
  let   busy       = false;

  // ── Supabase ──────────────────────────────────────────────
  const SUPA_URL  = 'https://mwbdviscbumgdwuwmurg.supabase.co';
  const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13YmR2aXNjYnVtZ2R3dXdtdXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mjc5NTYsImV4cCI6MjA5MDEwMzk1Nn0.xnAGVfidSY3T9uOduwSbRZJo8jdp202YB1QB0qLr7OM';
  const supa      = window.supabase.createClient(SUPA_URL, SUPA_ANON);

  let currentUser    = null;
  let currentSession = null;
  let isPremium      = false;
  let usedToday      = 0;
  let authTab        = 'login';

  // ── i18n ─────────────────────────────────────────────────
  const T = {
    nl: {
      tagline:      'Jouw persoonlijke beauty specialist',
      today:        'Vandaag',
      placeholder:  'Schrijf hier je bericht...',
      hint:         'Enter om te versturen \u00a0·\u00a0 Shift+Enter voor nieuwe regel',
      anders:       'Anders, namelijk\u2026',
      errPrefix:    'Er ging iets mis',
      errSuffix:    'Probeer het opnieuw.',
      youLabel:     'JIJ',
      loginWall:    'Log in om te beginnen',
      loginSub:     'Maak een gratis account aan en stel elke dag 5 vragen.',
      loginBtn:     'Inloggen / Registreren',
      remaining:    (n) => `${n}/${FREE_LIMIT} vragen over`,
      limitText:    `Je hebt je ${FREE_LIMIT} dagelijkse vragen gebruikt. Morgen kun je weer vragen stellen.`,
      sessionExp:   'Sessie verlopen — log opnieuw in.',
      limitReached: `Dagelijks limiet bereikt. Upgrade naar Premium voor onbeperkte vragen.`,
    },
    en: {
      tagline:      'Your personal beauty specialist',
      today:        'Today',
      placeholder:  'Write your message here\u2026',
      hint:         'Enter to send \u00a0·\u00a0 Shift+Enter for new line',
      anders:       'Other, namely\u2026',
      errPrefix:    'Something went wrong',
      errSuffix:    'Please try again.',
      youLabel:     'YOU',
      loginWall:    'Sign in to get started',
      loginSub:     'Create a free account and ask 5 questions every day.',
      loginBtn:     'Sign in / Register',
      remaining:    (n) => `${n}/${FREE_LIMIT} questions left`,
      limitText:    `You've used your ${FREE_LIMIT} daily questions. Come back tomorrow.`,
      sessionExp:   'Session expired — please sign in again.',
      limitReached: `Daily limit reached. Upgrade to Premium for unlimited questions.`,
    }
  };

  // ── System prompts ────────────────────────────────────────
  const SYSTEM = {
    nl: `Je bent BeautySense.AI, een rustige en deskundige beauty specialist.
Je voelt als een betrouwbare vriend of vriendin die alles weet over beauty — zonder te oordelen, zonder ingewikkeld te doen, en voor iedereen toegankelijk.

Specialisaties: Haarverzorging (alle haartypes), Skincare (alle huidtypes), Makeup, Lichaamsverzorging, Zonbescherming, Anti-aging, Voeding en beauty van binnenuit, Parfum advies.

INTAKE GESPREK — stel vragen één voor één, nooit allemaal tegelijk. Wacht altijd op het antwoord.

Stap 0 (allereerste vraag): Vraag naar geslacht — Man / Vrouw / Anders.
Stap 1: Onderwerp — welk gebied.
Stap 2: Ervaring — Beginner / Gemiddeld / Gevorderd.
Stap 3: Seizoen — Lente / Zomer / Herfst / Winter.
Stap 4: Budget — Betaalbaar (drugstore) / Midden / Premium.
Stap 5: Voorkeuren — vegan/allergieën/te vermijden ingrediënten, wat het product moet doen (hydrateren/anti-aging/beschermen/egaliseren), hoe belangrijk SPF is.
Stap 6: Concreet advies met producten en stap-voor-stap routine. Verwijs actief terug naar alle eerder gegeven antwoorden.

TOON OP BASIS VAN GESLACHT:
- Man: direct, praktisch, resultaatgericht, geen beauty jargon tenzij gevraagd, korte heldere zinnen, focus op efficiëntie.
- Vrouw: warm, uitgebreider, meer ruimte voor beleving en gevoel, toegankelijk maar met oog voor detail.
- Anders/niet gespecificeerd: neutraal en toegankelijk.

MEMORY — ACTIEF TERUGVERWIJZEN:
Onthoud ALLE antwoorden die de gebruiker geeft. Verwerk ook tussentijdse antwoorden direct in de volgende reactie. Laat nooit een antwoord onbeantwoord of genegeerd.
Verwijs actief terug bij het advies, bijvoorbeeld: "Je gaf aan een droge huid te hebben en een betaalbaar budget — daarom raad ik specifiek dit aan..."

Ingrediënten scanner: analyseer ingrediëntenlijst → Aanrader / Twijfel / Niet geschikt.

Nooit: medische diagnoses, één merk pushen, vage antwoorden.

OPMAAK: Bij een echte keuzevraag (beperkte vaste opties) sluit je de opties in met [OPTIES] en [/OPTIES], elke optie op een nieuwe regel. Gebruik dit ALLEEN voor vaste keuzes zoals Man/Vrouw, Beginner/Gemiddeld/Gevorderd, seizoenen, budgetniveaus etc. Gebruik het NIET bij open vragen, advies, productaanbevelingen of uitleg. Voorbeeld:
[OPTIES]
Man
Vrouw
Anders
[/OPTIES]`,

    en: `You are BeautySense.AI, a calm and knowledgeable beauty specialist.
You feel like a trusted friend who knows everything about beauty — without judgement, without complexity, accessible to everyone.

Specialisations: Hair care, Skincare, Makeup, Body care, Sun protection, Anti-aging, Nutrition & inner beauty, Perfume advice.

INTAKE — one question at a time, always wait for the answer.

Step 0 (very first question): Ask about gender — Male / Female / Other.
Step 1: Topic — which area.
Step 2: Experience — Beginner / Intermediate / Advanced.
Step 3: Season — Spring / Summer / Autumn / Winter.
Step 4: Budget — Affordable (drugstore) / Mid-range / Premium.
Step 5: Preferences — vegan/allergies/ingredients to avoid, what the product should do (hydrate/anti-aging/protect/even out), how important SPF is.
Step 6: Concrete advice with products and step-by-step routine. Actively reference all earlier answers.

TONE BASED ON GENDER:
- Male: direct, practical, results-focused, no beauty jargon unless asked, short clear sentences.
- Female: warm, more elaborate, room for experience and feeling, accessible but detailed.
- Other/not specified: neutral and accessible.

MEMORY — ACTIVELY REFERENCE BACK:
Remember ALL answers given. Process intermediate answers immediately. Never leave an answer unacknowledged.
Actively refer back when giving advice: "You mentioned dry skin and an affordable budget — that's why I specifically recommend..."

Ingredient scanner: analyse ingredient list → Recommended / Uncertain / Not suitable.

Never: medical diagnoses, push one brand, vague answers.

FORMAT: When asking a choice question with fixed options, wrap the options in [OPTIES] and [/OPTIES] tags, one option per line. Use this ONLY for fixed choices like Male/Female, Beginner/Intermediate/Advanced, seasons, budget levels etc. Do NOT use for open questions, advice, product recommendations or explanations. Example:
[OPTIES]
Male
Female
Other
[/OPTIES]`
  };

  // ── Greetings ─────────────────────────────────────────────
  const GREETING = {
    nl: `Welkom! Om je zo goed mogelijk te helpen — ben je een man of een vrouw?

[OPTIES]
Man
Vrouw
Anders / Liever niet zeggen
[/OPTIES]`,

    en: `Welcome! To help you as well as possible — are you male or female?

[OPTIES]
Male
Female
Other / Prefer not to say
[/OPTIES]`
  };

  // ── DOM ───────────────────────────────────────────────────
  const messagesEl   = document.getElementById('messages');
  const quickReplies = document.getElementById('quickReplies');
  const inputArea    = document.getElementById('inputArea');
  const userInput    = document.getElementById('userInput');
  const sendBtn      = document.getElementById('sendBtn');
  const taglineEl    = document.getElementById('tagline');
  const inputHintEl  = document.getElementById('inputHint');
  const btnNL        = document.getElementById('btnNL');
  const btnEN        = document.getElementById('btnEN');
  const loginBtn     = document.getElementById('loginBtn');
  const userPill     = document.getElementById('userPill');
  const userEmailEl  = document.getElementById('userEmail');
  const usageCountEl = document.getElementById('usageCount');
  const logoutBtn    = document.getElementById('logoutBtn');
  const authOverlay  = document.getElementById('authOverlay');
  const authSubmit   = document.getElementById('authSubmit');
  const authError    = document.getElementById('authError');
  const authEmailEl  = document.getElementById('authEmail');
  const authPassEl   = document.getElementById('authPassword');
  const limitBanner  = document.getElementById('limitBanner');
  const limitTextEl  = document.getElementById('limitText');

  // ── Language ──────────────────────────────────────────────
  function applyLang() {
    const t = T[lang];
    taglineEl.textContent = t.tagline;
    inputHintEl.innerHTML = t.hint;
    document.documentElement.lang = lang;
    btnNL.classList.toggle('active', lang === 'nl');
    btnEN.classList.toggle('active', lang === 'en');
    updateAuthUI();
  }

  function setLang(l) {
    if (l === lang) return;
    lang = l;
    localStorage.setItem('bs_lang', lang);
    applyLang();
    history.length = 0;
    clearChoices();
    messagesEl.innerHTML = '';
    if (currentUser) showGreeting(); else showLoginWall();
  }

  applyLang();

  // ── Auth state ────────────────────────────────────────────
  supa.auth.onAuthStateChange(async (event, session) => {
    currentSession = session;
    currentUser    = session?.user || null;
    if (currentUser) await loadUserState();
    updateAuthUI();
    messagesEl.innerHTML = '';
    clearChoices();
    history.length = 0;
    if (currentUser) showGreeting(); else showLoginWall();
  });

  async function loadUserState() {
    const jwt = currentSession?.access_token;
    if (!jwt) return;

    // Premium status
    const { data: profile } = await supa.from('profiles')
      .select('is_premium').eq('user_id', currentUser.id).single();
    isPremium = profile?.is_premium || false;

    // Today's usage
    const today = new Date().toISOString().split('T')[0];
    const { data: qs } = await supa.from('questions')
      .select('id').eq('user_id', currentUser.id).gte('created_at', `${today}T00:00:00`);
    usedToday = qs?.length || 0;
  }

  function updateAuthUI() {
    const t         = T[lang];
    const limitHit  = !isPremium && usedToday >= FREE_LIMIT;

    if (currentUser) {
      loginBtn.style.display  = 'none';
      userPill.style.display  = 'flex';
      userEmailEl.textContent = currentUser.email.split('@')[0];

      if (isPremium) {
        usageCountEl.textContent = 'Premium';
        usageCountEl.className   = 'usage-count premium';
      } else {
        const rem = Math.max(0, FREE_LIMIT - usedToday);
        usageCountEl.textContent = t.remaining(rem);
        usageCountEl.className   = 'usage-count';
      }

      limitTextEl.textContent = t.limitText;
      limitBanner.classList.toggle('show', limitHit);
    } else {
      loginBtn.style.display = '';
      userPill.style.display = 'none';
      limitBanner.classList.remove('show');
    }

    updateSendState();
  }

  // ── Auth modal ────────────────────────────────────────────
  loginBtn.addEventListener('click', () => openAuthModal());
  logoutBtn.addEventListener('click', async () => {
    await supa.auth.signOut();
  });

  function openAuthModal() {
    authOverlay.classList.add('open');
    authError.textContent = '';
    authEmailEl.value = '';
    authPassEl.value  = '';
    authEmailEl.focus();
  }

  authOverlay.addEventListener('click', e => {
    if (e.target === authOverlay) authOverlay.classList.remove('open');
  });

  function switchTab(tab) {
    authTab = tab;
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    authSubmit.textContent = tab === 'login'
      ? (lang === 'nl' ? 'Inloggen' : 'Sign in')
      : (lang === 'nl' ? 'Account aanmaken' : 'Create account');
    authError.textContent = '';
  }

  authSubmit.addEventListener('click', async () => {
    const email = authEmailEl.value.trim();
    const pass  = authPassEl.value;
    if (!email || !pass) { authError.textContent = lang === 'nl' ? 'Vul alle velden in.' : 'Fill in all fields.'; return; }

    authSubmit.disabled = true;
    authError.textContent = '';

    let error;
    if (authTab === 'login') {
      ({ error } = await supa.auth.signInWithPassword({ email, password: pass }));
    } else {
      ({ error } = await supa.auth.signUp({ email, password: pass }));
    }

    authSubmit.disabled = false;

    if (error) {
      authError.textContent = error.message;
    } else {
      authOverlay.classList.remove('open');
      if (authTab === 'register') {
        authError.textContent = '';
        // Show confirmation message briefly
        appendMessage('ai', lang === 'nl'
          ? 'Account aangemaakt! Controleer je e-mail om te bevestigen, dan kun je direct beginnen.'
          : 'Account created! Check your email to confirm, then you can start.');
      }
    }
  });

  authEmailEl.addEventListener('keydown', e => { if (e.key === 'Enter') authPassEl.focus(); });
  authPassEl.addEventListener('keydown',  e => { if (e.key === 'Enter') authSubmit.click(); });

  // ── Helpers ───────────────────────────────────────────────
  function updateSendState() {
    const t        = T[lang];
    const limitHit = !isPremium && usedToday >= FREE_LIMIT;
    const blocked  = busy || !currentUser || limitHit;
    sendBtn.disabled    = blocked;
    userInput.disabled  = blocked;
    userInput.placeholder = currentUser ? t.placeholder : (lang === 'nl' ? 'Log in om te beginnen...' : 'Sign in to start...');
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  // ── Login wall ────────────────────────────────────────────
  function showLoginWall() {
    const t   = T[lang];
    const el  = document.createElement('div');
    el.className = 'login-wall';
    el.innerHTML = `
      <div class="login-wall-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 3C8 3 5 6.5 5 10.5c0 2.8 1.5 5.2 3.8 6.5"/>
          <path d="M12 3c4 0 7 3.5 7 7.5c0 2.8-1.5 5.2-3.8 6.5"/>
          <path d="M9 17c0 2 1.3 3.5 3 3.5s3-1.5 3-3.5"/>
          <line x1="12" y1="20.5" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="login-wall-title">${t.loginWall}</div>
      <div class="login-wall-sub">${t.loginSub}</div>
      <button class="login-wall-btn">${t.loginBtn}</button>`;
    el.querySelector('.login-wall-btn').addEventListener('click', openAuthModal);
    messagesEl.appendChild(el);
  }

  // ── Markdown ──────────────────────────────────────────────
  function renderMarkdown(text) {
    let s = text
      .replace(/\[OPTIES\][\s\S]*?\[\/OPTIES\]/gi, '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/^- (.+)$/gm, '<li>$1</li>');
    s = s.replace(/(<li>[\s\S]*?<\/li>)(\n<li>[\s\S]*?<\/li>)*/g, m => `<ul>${m}</ul>`);
    return s.split(/\n{2,}/).map(b => b.trim()).filter(Boolean)
      .map(b => b.startsWith('<ul>') || b.startsWith('<ol>')
        ? b : `<p>${b.replace(/\n/g, '<br>')}</p>`)
      .join('');
  }

  // ── Extract options ───────────────────────────────────────
  function extractOptions(text) {
    const match = text.match(/\[OPTIES\]([\s\S]*?)\[\/OPTIES\]/i);
    if (!match) return [];
    const opts = match[1].split('\n').map(l => l.trim()).filter(Boolean);
    return (opts.length >= 2 && opts.length <= 10) ? opts : [];
  }

  // ── Choice buttons ────────────────────────────────────────
  function showChoices(options) {
    quickReplies.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn'; btn.textContent = opt;
      btn.addEventListener('click', () => { clearChoices(); sendText(opt); });
      quickReplies.appendChild(btn);
    });
    quickReplies.classList.add('visible');
    scrollBottom();
  }

  function clearChoices() {
    quickReplies.classList.remove('visible');
    quickReplies.innerHTML = '';
  }

  // ── Messages ──────────────────────────────────────────────
  function appendMessage(role, text) {
    const row    = document.createElement('div');
    row.className = `row ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'BS' : T[lang].youLabel;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = renderMarkdown(text);
    row.appendChild(avatar); row.appendChild(bubble);
    messagesEl.appendChild(row); scrollBottom();
  }

  function showTyping() {
    const row = document.createElement('div');
    row.id = 'typing-row'; row.className = 'row ai';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai'; avatar.textContent = 'BS';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai typing-dots';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(avatar); row.appendChild(bubble);
    messagesEl.appendChild(row); scrollBottom();
  }

  function removeTyping() { document.getElementById('typing-row')?.remove(); }

  // ── Greeting ──────────────────────────────────────────────
  function showGreeting() {
    const g = GREETING[lang];
    appendMessage('ai', g);
    history.push({ role: 'assistant', content: g });
    const opts = extractOptions(g);
    if (opts.length) showChoices(opts);
  }

  // ── Input ─────────────────────────────────────────────────
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 130) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!busy && currentUser) sendFromInput();
    }
  });

  sendBtn.addEventListener('click', () => { if (!busy && currentUser) sendFromInput(); });

  function sendFromInput() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = ''; userInput.style.height = 'auto';
    clearChoices();
    sendText(text);
  }

  // ── API ───────────────────────────────────────────────────
  async function sendText(text) {
    busy = true; updateSendState();
    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const jwt = currentSession?.access_token || '';
      const res = await fetch('/api/chat', {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${jwt}`,
        },
        body: JSON.stringify({
          model: MODEL, max_tokens: 1024,
          system: SYSTEM[lang], messages: history
        })
      });

      if (res.status === 401) {
        removeTyping();
        appendMessage('ai', T[lang].sessionExp);
        await supa.auth.signOut();
        busy = false; updateSendState();
        return;
      }

      if (res.status === 429) {
        removeTyping();
        usedToday = FREE_LIMIT;
        updateAuthUI();
        appendMessage('ai', T[lang].limitReached);
        busy = false; updateSendState();
        return;
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data  = await res.json();
      const reply = data.content?.[0]?.text || '...';

      removeTyping();
      appendMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });

      // Update local usage counter
      if (!isPremium) {
        usedToday++;
        updateAuthUI();
      }

      const opts = extractOptions(reply);
      if (opts.length) showChoices(opts);

    } catch (err) {
      removeTyping();
      const t = T[lang];
      appendMessage('ai', `${t.errPrefix}: ${err.message}\n\n${t.errSuffix}`);
    }

    busy = false; updateSendState();
    userInput.focus();
  }

  // ── Upgrade button ────────────────────────────────────────
  document.getElementById('upgradeBtn').addEventListener('click', () => {
    alert(lang === 'nl'
      ? 'Premium komt binnenkort beschikbaar!'
      : 'Premium coming soon!');
  });
</script>
</body>
</html>
